<!DOCTYPE html>
<html lang="ja">
<head>

    <meta charset="UTF-8">
    <title>予約</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>211AMOY预约</h1>

    <form id="bookingForm">

        姓名
        <input
                type="text"
                id="name"
                placeholder="必须"
                required
        >

        电子邮件
        <input
                type="email"
                id="email"
                placeholder=""
                
        >

        电话号码
        <input
                type="text"
                id="phone"
                placeholder="必須"
                required
        >

        予約年月日
        <input
                type="date"
                id="date"
                required
        >

        予約時間
        <select id="time" required>

            <option value="">選択してください</option>

            <option>09:00</option>
            <option>10:00</option>
            <option>11:00</option>
            <option>12:00</option>
            <option>13:00</option>
            <option>14:00</option>
            <option>15:00</option>
            <option>16:00</option>
            <option>17:00</option>
            <option>18:00</option>
            <option>19:00</option>

        </select>

        サービス

        <select id="service" required>

            <option value="">選択してください</option>

            <option>かっさ 20分/1800円</option>
            <option>吸い玉(伝統火罐十スライドカッピング) 20分/3000円</option>
            <option>手技による伝統懸灸(肩·首·腰·背中) 60分/7000円</option>
            <option>手技による伝統懸灸(肩·首·腰·背中) 十 吸い玉 75分/9000円</option>
            <option>手技による伝統懸灸(肩·首·腰·背中) 十 かっさ 70分/8000円</option>

        </select>

      <button type="submit">
            提出
        </button> 
 <!-- <button type="button" onclick="window.location.href='confirm.html'">
    提出
</button>-->
        
        <div id="message"></div>

    </form>

</div>

<script src="app.js"></script>

</body>
</html>
